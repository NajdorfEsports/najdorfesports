<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" fill="currentColor" role="img" aria-label="Najdorf bishop mark">
  <!-- Single-color SVG rendition of the bishop mark, a flexible one-color
       press variant. Renders in whatever the caller sets via currentColor,
       typically white on the dark site (`text-[var(--color-text)]`). The
       full-color canonical raster lives in branding/bishop-logo.png. -->

  <!-- Bishop chess piece -->
  <g transform="translate(56 6)">
    <!-- Mitre/head with diagonal slit -->
    <path fill-rule="evenodd" d="M44 4 C 58 26, 66 48, 66 64 C 66 78, 57 86, 44 86 C 31 86, 22 78, 22 64 C 22 48, 30 26, 44 4 Z M36 20 L 54 38 L 51 41 L 33 23 Z"/>
    <!-- Neck -->
    <rect x="36" y="80" width="16" height="14"/>
    <!-- Collar band -->
    <rect x="28" y="93" width="32" height="8" rx="1.5"/>
    <!-- Tapered upper base -->
    <path d="M30 99 L 58 99 L 62 124 L 26 124 Z"/>
    <!-- Wider lower base -->
    <path d="M20 122 L 68 122 L 70 138 L 18 138 Z"/>
    <!-- Floor shadow -->
    <ellipse cx="44" cy="141" rx="30" ry="4.5"/>
  </g>

  <!-- X-shaped chess pattern: 4 diamond tiles around a center keystone -->
  <g>
    <polygon points="56,178 67,189 56,200 45,189"/>
    <polygon points="56,200 67,211 56,222 45,211"/>
    <polygon points="133,189 144,200 133,211 122,200"/>
    <polygon points="155,189 166,200 155,211 144,200"/>
    <polygon points="45,245 56,256 45,267 34,256"/>
    <polygon points="67,245 78,256 67,267 56,256"/>
    <polygon points="144,234 155,245 144,256 133,245"/>
    <polygon points="144,256 155,267 144,278 133,267"/>
    <polygon points="100,212 108,220 100,228 92,220"/>
  </g>
</svg>
