name: Refresh Liquipedia data

on:
  workflow_dispatch: {}
  schedule:
    # Every ~8 hours (00:07, 08:07, 16:07 UTC) during the season so opponents,
    # times, and results refresh without manual edits. The auto-commit below
    # pushes to main, and Cloudflare Pages' git integration redeploys on that
    # push, so no separate deploy hook is needed. Still Liquipedia-friendly:
    # the fetcher enforces 1 parse / 30s, so a run is a few dozen calls, far
    # under the cap. To cut Actions usage back to the old weekly cadence,
    # restore: '7 9 * * 1'. workflow_dispatch covers ad-hoc mid-day refreshes.
    - cron: '7 */8 * * *'

permissions:
  contents: write

concurrency:
  group: liquipedia-refresh
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    # Per-player enrichment adds ~30s sleep per active roster member to
    # honor Liquipedia's 1-parse-per-30s rate limit. 15 min gives plenty of
    # headroom for a 10-player roster + 4 tournament pages.
    timeout-minutes: 15
    steps:
      # Actions are pinned to commit SHAs (not floating tags) so a
      # compromised tag at any of these repos cannot inject arbitrary
      # commits into `main`. The human-readable version tag is in the
      # trailing comment; Dependabot / Renovate can bump both atomically.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # npm install cache, keyed on the lockfile. Saves ~20s per weekly
      # run; more importantly, makes the workflow resilient to a flaky
      # npm registry on cron Mondays.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-

      # The fetch script imports src/data/schemas.ts, which needs zod from
      # node_modules; without this step the job dies on ERR_MODULE_NOT_FOUND.
      - name: Install dependencies
        run: npm ci

      - name: Fetch roster, matches, achievements from Liquipedia
        run: node scripts/fetch-liquipedia.mjs

      - name: Commit updated data (if changed)
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: 'chore(data): refresh from Liquipedia'
          file_pattern: |
            src/data/matches.json
            src/data/roster.json
            src/data/achievements.json
