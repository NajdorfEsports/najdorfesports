name: Link check

# Scheduled sweep of every internal and external link in the built site.
# 403 and 429 are accepted: X, Twitch, and Liquipedia routinely refuse
# anonymous CI bots, and a bot-block is not a broken link. Failures open
# a GitHub issue instead of failing silently in the Actions tab. Never
# part of the deploy path.

on:
  schedule:
    # Tuesdays 06:43 UTC, after the Lighthouse run.
    - cron: '43 6 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --base dist
            --accept '200..299,403,429'
            --no-progress
            'dist/**/*.html'
          fail: true

      - name: Open an issue with the report
        if: failure()
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: 'Link check: broken links found'
          content-filepath: ./lychee/out.md
          labels: link-check
