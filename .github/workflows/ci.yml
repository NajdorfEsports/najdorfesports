name: CI build check

# The project commits straight to `main` and Cloudflare Pages auto-deploys
# every push, so there is no PR review gate. This workflow is a lightweight
# safety net: it type-checks and builds on every push to `main` (and on any
# PR, if one is ever opened) so a broken build surfaces here instead of only
# in the Cloudflare deploy log. It does NOT deploy: Cloudflare owns deploy.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Pinned to commit SHAs (not floating tags); human-readable version is
      # in the trailing comment, matching the convention in update-matches.yml.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Em-dash guard. The owner bans em-dashes (U+2014) anywhere in shipped
      # copy, content, JSON-LD, or alt text. Scan the source + public surfaces
      # only; CLAUDE.md is intentionally excluded because it documents the rule
      # by quoting the character. En-dashes (U+2013) in numeric ranges are fine.
      - name: Em-dash guard
        run: |
          if grep -rInP '\x{2014}|&mdash;|&#8212;|&#x2014;' src public; then
            echo "::error::Em-dash (U+2014) found above. Replace with a period, comma, colon, semicolon, parentheses, or restructure the sentence."
            exit 1
          fi
          echo "No em-dashes found in src/ or public/."

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx astro check

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
