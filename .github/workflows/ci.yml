name: CI build check

# The project commits straight to `main` and Cloudflare Pages auto-deploys
# every push, so there is no PR review gate. This workflow is a lightweight
# safety net: it type-checks and builds on every push to `main` (and on any
# PR, if one is ever opened) so a broken build surfaces here instead of only
# in the Cloudflare deploy log. It does NOT deploy: Cloudflare owns deploy.

on:
  push:
    branches: [main, 'redesign/**', 'feature/**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Pinned to commit SHAs (not floating tags); human-readable version is
      # in the trailing comment, matching the convention in update-matches.yml.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Em-dash guard. The owner bans em-dashes (U+2014) anywhere in the repo,
      # not just shipped copy. Two checks:
      #   1) the literal U+2014 character in ANY tracked file. CLAUDE.md names
      #      the code point instead of printing it, so this whole-repo scan
      #      stays green unless a real em-dash slips in.
      #   2) HTML-entity em-dash forms on the shipped surfaces (src/ + public/)
      #      only: scanning the whole repo for those strings would match this
      #      guard's own pattern below.
      # En-dashes (U+2013) in numeric ranges are fine.
      - name: Em-dash guard
        run: |
          # Build the literal U+2014 bytes with printf (writing the character
          # into this file would make the guard match itself) and search every
          # tracked file with a fixed-string git grep. PCRE \x{} escapes are not
          # portable across git's PCRE builds (some reject \x{2014} as "too
          # large" in 8-bit mode), so avoid grep -P for the literal scan.
          emdash=$(printf '\342\200\224')
          if git grep -nFI "$emdash"; then
            echo "::error::Em-dash (U+2014) found above. Replace with a period, comma, colon, semicolon, parentheses, or restructure the sentence."
            exit 1
          fi
          if grep -rInE '&mdash;|&#8212;|&#x2014;' src public; then
            echo "::error::HTML-entity em-dash found above. Use plain text with no em-dash."
            exit 1
          fi
          echo "No em-dashes found in the repo."

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx astro check

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # CSP invariant: script-src ships without 'unsafe-inline', so no built
      # page may contain an executable inline script (JSON-LD data blocks
      # are exempt). Keeps the policy honest forever, not just this pass.
      - name: No inline scripts in dist
        run: node scripts/check-no-inline-scripts.mjs

      # E2E against the built site (wrangler dev serves dist with _headers
      # and _redirects applied). Browser binaries are cached on the
      # Playwright version so most runs skip the download.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809 # v4.2.4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
