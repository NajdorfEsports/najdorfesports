name: Refresh social stats

# Keeps the live community counts (Discord members, etc.) fresh. Counts move
# slowly, so this runs weekly to avoid burning Actions minutes; trigger it from
# the Actions tab any time for an on-demand refresh (e.g. after a member surge
# or while streaming, to update the "watching now" number).
on:
  workflow_dispatch: {}
  schedule:
    # Weekly, Monday 09:22 UTC. Offset a few minutes from the Liquipedia refresh
    # (09:07) so the two weekly jobs don't overlap.
    - cron: '22 9 * * 1'

permissions:
  contents: write

concurrency:
  group: social-stats-refresh
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      # Actions pinned to commit SHAs (not floating tags) so a compromised tag
      # cannot inject commits into main. Human-readable version in the comment.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            npm-

      # Discord needs no secret. The others are optional: each source skips
      # itself when its credentials are absent, so the job is safe to run with
      # any subset of these set (or none).
      - name: Fetch social / community stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TWITCH_LOGIN: ${{ secrets.TWITCH_LOGIN }}
        run: node scripts/fetch-social-stats.mjs

      - name: Commit updated stats (if changed)
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5.2.0
        with:
          commit_message: 'chore(data): refresh social stats'
          file_pattern: |
            src/data/social-stats.json
