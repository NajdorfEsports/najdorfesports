# Najdorf Esports coaching feedback Worker.
# Independent of the Astro Pages deploy (that ships via Cloudflare Pages Git
# integration). Deploy this with `wrangler deploy` from inside workers/feedback.
name = "najdorf-feedback"
main = "src/index.ts"
compatibility_date = "2026-05-23"
compatibility_flags = ["nodejs_compat"]

# Scan every 5 minutes: send feedback for sessions whose 48h window has elapsed
# (and, in TEST_MODE, bookings whose 10-minute test delay has elapsed). Well
# inside the free tier; the cron only writes KV when it actually sends.
[triggers]
crons = ["*/5 * * * *"]

# Non-secret vars. Secrets (CALCOM_WEBHOOK_SECRET, RESEND_API_KEY,
# TALLY_FORM_URL) are set with `wrangler secret put` and never committed.
[vars]
FROM_ADDRESS = "feedback@najdorfesports.gg"
TEST_MODE = "false"

# Scheduling store. Create it once, then paste the id here:
#   wrangler kv namespace create FEEDBACK_KV
[[kv_namespaces]]
binding = "FEEDBACK_KV"
id = "0347267733d6410ca8b17090f9718b52"
